name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --all-features --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: nodex-linux
          path: target/release/nodex
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  msrv:
    # Keep `matrix.rust` in sync with `rust-version` in the root Cargo.toml —
    # the first step fails the job if they drift, so the label shown in PR
    # checks ("MSRV (<ver>)") can never claim a version the build isn't
    # actually testing against. `matrix` context IS valid inside a job's
    # `name:`; `steps` is not, which is why this pattern is the idiomatic
    # one for Rust CI.
    name: MSRV (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: ["1.94"]
    steps:
      - uses: actions/checkout@v6
      - name: Verify MSRV matches Cargo.toml
        shell: bash
        run: |
          declared=$(grep -m1 '^rust-version' Cargo.toml | cut -d'"' -f2)
          if [ "$declared" != "${{ matrix.rust }}" ]; then
            echo "::error::CI MSRV '${{ matrix.rust }}' drifted from Cargo.toml rust-version '$declared'"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: msrv
      - run: cargo check --workspace --all-features --locked
