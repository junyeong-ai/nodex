name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --all-features --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: nodex-linux
          path: target/release/nodex
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  msrv:
    name: MSRV (${{ steps.rustver.outputs.version }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: rustver
        shell: bash
        run: |
          version=$(grep -m1 '^rust-version' Cargo.toml | cut -d'"' -f2)
          [ -n "$version" ] || { echo "::error::rust-version missing in Cargo.toml"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rustver.outputs.version }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: msrv
      - run: cargo check --workspace --all-features --locked
