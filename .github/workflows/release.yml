name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../nodex-${{ matrix.target }}.tar.gz nodex
          cd ../../..
          sha256sum nodex-${{ matrix.target }}.tar.gz > nodex-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/nodex.exe" -DestinationPath "nodex-${{ matrix.target }}.zip"
          (Get-FileHash "nodex-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  nodex-${{ matrix.target }}.zip" | Out-File "nodex-${{ matrix.target }}.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: nodex-${{ matrix.target }}
          path: nodex-${{ matrix.target }}.*
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect artifacts
        run: |
          mkdir -p release
          cp artifacts/nodex-*/* release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
