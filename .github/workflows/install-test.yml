name: Install Test

on:
  pull_request:
    paths:
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - "scripts/uninstall.sh"
      - "scripts/uninstall.ps1"
      - ".github/workflows/install-test.yml"
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  # Build the binary ourselves and exercise the --from-source path end-to-end
  # on every supported OS, including the skill install side-effect. Uses a
  # sandboxed FAKE_HOME so we never touch the runner's real user profile.
  from_source:
    name: From-source install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1

      - name: Install + skill round-trip (bash)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # Sandbox only the surfaces the installer touches (HOME for skills);
          # keep RUSTUP_HOME/CARGO_HOME pointing at the runner's toolchain.
          export RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}"
          export CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
          FAKE_HOME="$(mktemp -d)"
          HOME="$FAKE_HOME" NODEX_YES=1 ./scripts/install.sh --from-source --skill user --install-dir "$FAKE_HOME/bin"
          "$FAKE_HOME/bin/nodex" --version
          test -f "$FAKE_HOME/.claude/skills/nodex/SKILL.md" || { echo "skill missing"; exit 1; }
          HOME="$FAKE_HOME" NODEX_YES=1 ./scripts/uninstall.sh --install-dir "$FAKE_HOME/bin"
          test ! -f "$FAKE_HOME/bin/nodex" || { echo "binary still present"; exit 1; }
          test ! -d "$FAKE_HOME/.claude/skills/nodex" || { echo "skill still present"; exit 1; }

      - name: Install + skill round-trip (powershell)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Preserve rustup/cargo home; sandbox only USERPROFILE (skills use it).
          $fake = Join-Path ([IO.Path]::GetTempPath()) ("nodex-test-" + [Guid]::NewGuid().ToString("N").Substring(0,8))
          New-Item -ItemType Directory -Force -Path $fake | Out-Null
          if (-not $env:RUSTUP_HOME) { $env:RUSTUP_HOME = Join-Path $env:USERPROFILE ".rustup" }
          if (-not $env:CARGO_HOME)  { $env:CARGO_HOME  = Join-Path $env:USERPROFILE ".cargo" }
          $env:USERPROFILE = $fake
          .\scripts\install.ps1 -FromSource -Skill user -InstallDir (Join-Path $fake "bin") -Yes
          & (Join-Path $fake "bin\nodex.exe") --version
          if (-not (Test-Path (Join-Path $fake ".claude\skills\nodex\SKILL.md"))) { throw "skill missing" }
          .\scripts\uninstall.ps1 -InstallDir (Join-Path $fake "bin") -Yes
          if (Test-Path (Join-Path $fake "bin\nodex.exe")) { throw "binary still present" }
          if (Test-Path (Join-Path $fake ".claude\skills\nodex")) { throw "skill still present" }

  # Exercise the prebuilt-download path after a successful Release run.
  prebuilt:
    name: Prebuilt install (${{ matrix.os }})
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install (bash, prebuilt)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          FAKE_HOME="$(mktemp -d)"
          HOME="$FAKE_HOME" NODEX_YES=1 ./scripts/install.sh --skill none --install-dir "$FAKE_HOME/bin"
          "$FAKE_HOME/bin/nodex" --version

      - name: Install (powershell, prebuilt)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $fake = Join-Path ([IO.Path]::GetTempPath()) ("nodex-test-" + [Guid]::NewGuid().ToString("N").Substring(0,8))
          New-Item -ItemType Directory -Force -Path $fake | Out-Null
          $env:USERPROFILE = $fake
          .\scripts\install.ps1 -Skill none -InstallDir (Join-Path $fake "bin") -Yes
          & (Join-Path $fake "bin\nodex.exe") --version
